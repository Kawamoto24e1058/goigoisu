<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ゴイゴイスー App V10 Refactor</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #start-container {
            text-align: center;
            z-index: 10;
        }

        #start-button {
            padding: 25px 60px;
            font-size: 2rem;
            font-weight: 900;
            color: #ffffff;
            background: linear-gradient(135deg, #ff4d00, #ff0000);
            border: none;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            cursor: pointer;
            transition: transform 0.1s;
        }

        #start-button:active {
            transform: scale(0.95);
        }

        .guide-text {
            margin-top: 25px;
            font-size: 1.1rem;
            opacity: 0.8;
            font-weight: bold;
        }

        #result-display {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center; /* Vertical Center */
            justify-content: center; /* Horizontal Center */
            overflow: hidden; /* Prevent Overflow */
            pointer-events: none;
            z-index: 100;
        }

        .goi-su-text {
            font-family: sans-serif, Impact, 'Arial Black';
            font-size: min(18vw, 120px); /* Clamped for safety */
            font-weight: 900;
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: -0.5rem; /* Compressed for visibility */
            text-align: center;
        }

        /* ---------------- V11 Goi Styles (Vertical Shake) ---------------- */
        .color-goi {
            color: #FFFF00;
            text-shadow: 0 5px 15px #000, 0 0 30px #ff4d00;
        }

        @keyframes fadeOutGoi {
            0% { opacity: 1; transform: scale(1.1) translateY(0); text-shadow: 0 0 50px #fff; }
            100% { opacity: 0; transform: scale(1.0) translateY(-10vh); text-shadow: 0 0 0 transparent; }
        }

        .animate-goi {
            animation: fadeOutGoi 1.0s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        }

        /* ---------------- V11 Su Styles (Impact but Safe Scale) ---------------- */
        .color-su {
            color: #FFFFFF;
            text-shadow: 0 0 20px #00aaff, 0 0 40px #ffffff, 0 0 60px #00aaff;
        }

        @keyframes impactSu {
            0% { opacity: 1; transform: scale(1.5); text-shadow: 0 0 100px #fff; }
            15% { opacity: 1; transform: scale(1.2); text-shadow: 0 0 40px #00aaff; }
            85% { opacity: 1; transform: scale(1.2); text-shadow: 0 0 40px #00aaff; }
            100% { opacity: 0; transform: scale(1.15); text-shadow: 0 0 0 transparent; }
        }

        .animate-su {
            animation: impactSu 1.5s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        }

        @keyframes whiteFlash {
            0% { background-color: #ffffff; }
            15% { background-color: rgba(255, 255, 255, 0.3); }
            100% { background-color: #000000; }
        }

        .flash-white {
            animation: whiteFlash 0.6s ease-out forwards;
        }

        #debug-log {
            position: fixed;
            bottom: 10px;
            left: 10px;
            right: 10px;
            color: #ffaa00;
            font-size: 10px;
            font-family: monospace;
            pointer-events: none;
            z-index: 1000;
            white-space: pre-wrap;
            display: none;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="start-container">
        <button id="start-button">開始（許可）</button>
        <p class="guide-text">縦に振ると「ゴイ！」、横に振ると「スー！」</p>
    </div>

    <div id="result-display">
        <div id="text-element" class="goi-su-text"></div>
    </div>

    <div id="debug-log"></div>

    <script>
        const startButton = document.getElementById('start-button');
        const startContainer = document.getElementById('start-container');
        const textElement = document.getElementById('text-element');

        let synth = null;
        let lastTriggerTime = 0;
        const COOLDOWN_MS = 600; // 0.6s Cooldown
        const THRESHOLD = 15;    // Acceleration Threshold
        let wakeLock = null;

        function speak(text, pitch, rate) {
            if (!synth) return;
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ja-JP';
            utter.pitch = pitch;
            utter.rate = rate;
            synth.speak(utter);
        }

        function showResult(type) {
            const isSu = type === 'su';
            textElement.textContent = isSu ? 'スー！' : 'ゴイ！';
            
            // Visual Reset
            textElement.classList.remove('animate-goi', 'animate-su', 'color-goi', 'color-su');
            document.body.classList.remove('flash-white');
            void textElement.offsetWidth; // Reflow
            
            if (isSu) {
                textElement.classList.add('animate-su', 'color-su');
                document.body.classList.add('flash-white');
                speak('スーーー！', 1.6, 0.8);
            } else {
                textElement.classList.add('animate-goi', 'color-goi');
                speak('ゴイ！', 0.9, 1.3);
            }
        }

        function handleMotion(event) {
            const acc = event.acceleration;
            if (!acc) return;
            
            const x = acc.x || 0;
            const y = acc.y || 0;
            const absX = Math.abs(x);
            const absY = Math.abs(y);
            const now = Date.now();

            if (now - lastTriggerTime < COOLDOWN_MS) return;

            // V12 Strict Axis Priority: Only trigger the larger/dominant axis
            if (absY > THRESHOLD || absX > THRESHOLD) {
                if (absY > absX) {
                    // Vertical Dominant -> Goi!
                    showResult('goi');
                    lastTriggerTime = now;
                } else if (absX > absY) {
                    // Horizontal Dominant -> Su!
                    showResult('su');
                    lastTriggerTime = now;
                }
            }
        }

        function startApp() {
            startContainer.classList.add('hidden');
            window.addEventListener('devicemotion', handleMotion);
        }

        startButton.addEventListener('click', () => {
            synth = window.speechSynthesis;
            const unlockUtter = new SpeechSynthesisUtterance('');
            synth.speak(unlockUtter);

            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                osc.connect(audioCtx.destination);
                osc.start(0);
                osc.stop(audioCtx.currentTime + 0.001);
            } catch (e) {}

            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').then(lock => {
                    wakeLock = lock;
                }).catch(() => {});
            }

            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') startApp();
                    })
                    .catch(console.error);
            } else {
                startApp();
            }
        });
    </script>
</body>
</html>
