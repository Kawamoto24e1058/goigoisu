<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ゴイゴイスー App V16 (Variety Edition)</title>
    
    <!-- Japanese Variety Show Font: Dela Gothic One -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Sunburst Background: Deep Red to Dark Red */
            background: repeating-conic-gradient(
                #d11a2a 0 15deg,
                #a10d1c 15deg 30deg
            );
            color: #ffffff;
            font-family: 'Dela Gothic One', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Screen Shake Effect for Goi */
        @keyframes screenShake {
            0% { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(-2vw, -2vh) rotate(-2deg); }
            30% { transform: translate(2vw, 2vh) rotate(2deg); }
            50% { transform: translate(-2vw, 2vh) rotate(-1deg); }
            70% { transform: translate(2vw, -2vh) rotate(1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .shake-body {
            animation: screenShake 0.3s ease-out;
        }

        #start-container {
            text-align: center;
            z-index: 10;
            background: rgba(0,0,0,0.7);
            padding: 40px;
            border-radius: 20px;
            border: 4px solid #fff;
        }

        #start-button {
            padding: 20px 50px;
            font-size: 2rem;
            font-family: 'Dela Gothic One', sans-serif;
            color: #fff;
            background: #e60000;
            border: 4px solid #fff;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        #start-button:active {
            transform: scale(0.95);
        }

        .guide-text {
            margin-top: 25px;
            font-size: 1.2rem;
            opacity: 0.9;
        }

        #result-display {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            pointer-events: none;
            z-index: 100;
        }

        .goi-su-text {
            font-size: min(20vw, 150px);
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: -0.1em;
            text-align: center;
        }

        /* Double Stroke Mixin for Variety Telop: Black inner border, White outer border */
        .double-stroke {
            text-shadow: 
                /* 1vw Inner Black Stroke */
                -1vw -1vw 0 #000,  1vw -1vw 0 #000, -1vw  1vw 0 #000,  1vw  1vw 0 #000,
                 0   -1vw 0 #000,  0    1vw 0 #000, -1vw  0   0 #000,  1vw  0   0 #000,
                /* 2.5vw Outer White Stroke */
                -2.5vw -2.5vw 0 #fff,  2.5vw -2.5vw 0 #fff, -2.5vw  2.5vw 0 #fff,  2.5vw  2.5vw 0 #fff,
                 0    -2.5vw 0 #fff,  0     2.5vw 0 #fff, -2.5vw  0   0 #fff,  2.5vw  0   0 #fff,
                /* Drop Shadow */
                 3vw 3vw 0px rgba(0,0,0,0.4);
        }

        /* ---------------- V16 Goi Styles (Pop & Shake) ---------------- */
        .color-goi {
            color: #FFEA00;
        }

        @keyframes popGoi {
            0% { transform: scale(0); opacity: 0; }
            20% { transform: scale(1.3); opacity: 1; }
            80% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        .animate-goi {
            animation: popGoi 1.0s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        }

        /* ---------------- V16 Su Styles (Back-To-Front Zoom) ---------------- */
        .color-su {
            color: #00E5FF;
            font-style: italic;
        }

        @keyframes zoomSu {
            0% { transform: scale(0.1); opacity: 0; }
            30% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1.0); opacity: 1; }
        }

        .animate-su {
            animation: zoomSu 2.0s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        }

        /* Particles */
        .star-particle {
            position: absolute;
            top: 50%; 
            left: 50%;
            width: min(8vw, 60px); 
            height: min(8vw, 60px);
            background: #FFEA00;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: blast 0.6s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
            z-index: 50;
            pointer-events: none;
        }

        @keyframes blast {
            0% { transform: translate(-50%, -50%) scale(0.5) rotate(0deg); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.5) rotate(360deg); opacity: 0; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="start-container">
        <button id="start-button">開始（許可）</button>
        <p class="guide-text">↑ 縦振り：ゴイ！<br>→ 横振り：スー！</p>
    </div>

    <div id="result-display">
        <div id="text-element" class="goi-su-text double-stroke"></div>
    </div>

    <script>
        const startButton = document.getElementById('start-button');
        const startContainer = document.getElementById('start-container');
        const textElement = document.getElementById('text-element');

        let synth = null;
        let lastTriggerTime = 0;
        const COOLDOWN_MS = 600; 
        const THRESHOLD = 15;
        let wakeLock = null;

        function speak(text, pitch, rate) {
            if (!synth) return;
            synth.cancel(); 
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ja-JP';
            utter.pitch = pitch;
            utter.rate = rate;
            synth.speak(utter);
        }

        function createParticles() {
            // Clear existing particles
            document.querySelectorAll('.star-particle').forEach(el => el.remove());
            
            for(let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'star-particle';
                document.body.appendChild(p);
                
                // Random blast trajectory
                const angle = Math.random() * Math.PI * 2;
                const velocity = 30 + Math.random() * 50; // vw distance
                p.style.setProperty('--tx', Math.cos(angle) * velocity + 'vw');
                p.style.setProperty('--ty', Math.sin(angle) * velocity + 'vw');
                
                setTimeout(() => p.remove(), 600);
            }
        }

        function showResult(type) {
            const isSu = type === 'su';
            textElement.textContent = isSu ? 'スー！' : 'ゴイ！';
            
            // Visual Reset
            textElement.classList.remove('animate-goi', 'animate-su', 'color-goi', 'color-su');
            document.body.classList.remove('shake-body');
            void textElement.offsetWidth; // Force Reflow
            
            // Blast Particles
            createParticles();

            if (isSu) {
                textElement.classList.add('animate-su', 'color-su');
                speak('スーーー！', 1.6, 0.8);
            } else {
                textElement.classList.add('animate-goi', 'color-goi');
                document.body.classList.add('shake-body');
                // Haptic feedback for Goi! if supported (Android only generally)
                if (navigator.vibrate) navigator.vibrate(100);
                speak('ゴイ！', 0.9, 1.3);
            }
        }

        function handleMotion(event) {
            const acc = event.acceleration;
            if (!acc) return;
            
            const x = acc.x || 0;
            const y = acc.y || 0;
            const absX = Math.abs(x);
            const absY = Math.abs(y);
            const now = Date.now();

            if (now - lastTriggerTime < COOLDOWN_MS) return;

            if (absY > THRESHOLD || absX > THRESHOLD) {
                if (absY > absX) {
                    showResult('goi');
                    lastTriggerTime = now;
                } else if (absX > absY) {
                    showResult('su');
                    lastTriggerTime = now;
                }
            }
        }

        function startApp() {
            startContainer.classList.add('hidden');
            window.addEventListener('devicemotion', handleMotion);
        }

        startButton.addEventListener('click', () => {
            synth = window.speechSynthesis;
            const unlockUtter = new SpeechSynthesisUtterance('');
            synth.speak(unlockUtter);

            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                osc.connect(audioCtx.destination);
                osc.start(0);
                osc.stop(audioCtx.currentTime + 0.001);
            } catch (e) {}

            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').then(lock => {
                    wakeLock = lock;
                }).catch(() => {});
            }

            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') startApp();
                    })
                    .catch(console.error);
            } else {
                startApp();
            }
        });
    </script>
</body>
</html>
