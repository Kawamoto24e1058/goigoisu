<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ゴイゴイスー App V3</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #start-container {
            text-align: center;
            z-index: 10;
        }

        #start-button {
            padding: 25px 60px;
            font-size: 2rem;
            font-weight: 900;
            color: #ffffff;
            background: linear-gradient(135deg, #ff4d00, #ff0000);
            border: none;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            cursor: pointer;
            transition: transform 0.1s;
        }

        #start-button:active {
            transform: scale(0.95);
        }

        .guide-text {
            margin-top: 25px;
            font-size: 1rem;
            opacity: 0.7;
            font-weight: bold;
        }

        #result-display {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 100;
        }

        .goi-su-text {
            font-size: 35vw;
            font-weight: 900;
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
        }

        /* ---------------- V7 Goi Styles (Slide up fade) ---------------- */
        .color-goi {
            color: #FFFF00;
            text-shadow: 0 5px 15px #000, 0 0 30px #ff4d00;
        }

        @keyframes fadeUpGoi {
            0% { opacity: 1; transform: scale(1.5) translateY(0); text-shadow: 0 0 50px #fff; }
            100% { opacity: 0; transform: scale(1) translateY(-15vh); text-shadow: 0 0 0 transparent; }
        }

        .animate-goi {
            animation: fadeUpGoi 1.0s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        }

        /* ---------------- V7 Su Styles (Massive Impact) ---------------- */
        .color-su {
            color: #FFFFFF;
            text-shadow: 0 10px 20px #000, 0 0 40px #00aaff, 0 0 80px #fff;
        }

        @keyframes impactSu {
            0% { opacity: 1; transform: scale(5); text-shadow: 0 0 150px #fff; }
            15% { opacity: 1; transform: scale(2.5); text-shadow: 0 0 40px #00aaff; }
            80% { opacity: 1; transform: scale(2.5); text-shadow: 0 0 40px #00aaff; }
            100% { opacity: 0; transform: scale(2.4); text-shadow: 0 0 0 transparent; }
        }

        .animate-su {
            animation: impactSu 2.0s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        }

        @keyframes whiteFlash {
            0% { background-color: #ffffff; }
            15% { background-color: rgba(255, 255, 255, 0.2); }
            100% { background-color: #000000; }
        }

        .flash-white {
            animation: whiteFlash 0.5s ease-out forwards;
        }

        #debug-log {
            position: fixed;
            bottom: 10px;
            left: 10px;
            right: 10px;
            color: #ffaa00;
            font-size: 10px;
            font-family: monospace;
            pointer-events: none;
            z-index: 1000;
            white-space: pre-wrap;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="start-container">
        <button id="start-button">開始（許可）</button>
        <p class="guide-text">スマホを前に突き出すと喋ります</p>
    </div>

    <div id="result-display">
        <div id="text-element" class="goi-su-text"></div>
    </div>

    <div id="debug-log"></div>

    <script>
        const startButton = document.getElementById('start-button');
        const startContainer = document.getElementById('start-container');
        const textElement = document.getElementById('text-element');

        let synth = null;
        let hasTriggered = false;
        let isCheckingPush = false;
        let zBelowThresholdStart = 0;
        let wakeLock = null;

        function speak(text, pitch, rate) {
            if (!synth) return;
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ja-JP';
            utter.pitch = pitch;
            utter.rate = rate;
            synth.speak(utter);
        }

        function showResult(type) {
            const isSu = type === 'su';
            textElement.textContent = isSu ? 'スー！' : 'ゴイ！';
            
            // Trigger Visuals
            textElement.classList.remove('animate-goi', 'animate-su', 'color-goi', 'color-su');
            document.body.classList.remove('flash-white');
            void textElement.offsetWidth; // Reflow to reset animation completely
            
            if (isSu) {
                textElement.classList.add('animate-su', 'color-su');
                document.body.classList.add('flash-white'); // Flash background on Su
            } else {
                textElement.classList.add('animate-goi', 'color-goi');
                // No flash on Goi
            }

            // Trigger Audio with optimized parameters
            if (isSu) {
                // Su: Super high pitch (1.6)
                speak('スーーー！', 1.6, 0.8);
            } else {
                // Goi: V8 modification (Clearer sound with slight pause 'っ')
                speak('っゴイ！', 0.9, 1.3);
            }
        }

        function handleMotion(event) {
            const acc = event.acceleration;
            const accG = event.accelerationIncludingGravity;
            if (!acc || !accG) return;
            
            const z = acc.z || 0;
            const gY = accG.y || 0;

            // Z axis <= -20 logic (Firm push with 50ms filter)
            if (z <= -20) {
                if (!hasTriggered) {
                    if (!isCheckingPush) {
                        isCheckingPush = true;
                        zBelowThresholdStart = Date.now();
                    } else if (Date.now() - zBelowThresholdStart > 50) {
                        // Movement held for > 50ms, trigger!
                        hasTriggered = true;
                        isCheckingPush = false;
                        
                        // Angle check: upright (gY >= 7.0) -> Su, flat -> Goi
                        if (gY >= 7.0) {
                            showResult('su');
                        } else {
                            showResult('goi');
                        }
                    }
                }
            } else {
                // Reset the 50ms timer if it bounces up before triggering
                isCheckingPush = false;
                
                // Wait until movement fully subsides to prevent multiple rapid triggers
                if (z > -5) {
                    hasTriggered = false;
                }
            }
        }

        function logDebug(msg) {
            const logEl = document.getElementById('debug-log');
            if (logEl) logEl.textContent += msg + '\n';
        }

        function startApp() {
            startContainer.classList.add('hidden');
            window.addEventListener('devicemotion', handleMotion);
            logDebug('App Started. Listening to devicemotion...');
        }

        startButton.addEventListener('click', () => {
            logDebug('Start Button Clicked.');
            
            // 1. Speech Synthesis unlock
            try {
                synth = window.speechSynthesis;
                const unlockUtter = new SpeechSynthesisUtterance('');
                synth.speak(unlockUtter);
            } catch(e) {
                logDebug('Speech unlock error: ' + e.message);
            }

            // 2. Audio Context unlock
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                osc.connect(audioCtx.destination);
                osc.start(0);
                osc.stop(audioCtx.currentTime + 0.001);
            } catch (e) {
                logDebug('AudioContext unlock error: ' + e.message);
            }

            // 3. DeviceMotion Permission
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                logDebug('Requesting DeviceMotion permission...');
                DeviceMotionEvent.requestPermission()
                    .then(permissionState => {
                        logDebug('Permission state: ' + permissionState);
                        if (permissionState === 'granted') {
                            startApp();
                        } else {
                            logDebug('Permission was NOT granted.');
                        }
                    })
                    .catch(err => {
                        logDebug('DeviceMotion error: ' + err.message);
                    });
            } else {
                logDebug('DeviceMotionEvent.requestPermission is not a function (Non-iOS).');
                startApp();
            }

            // 4. Wake Lock request
            try {
                if ('wakeLock' in navigator) {
                    navigator.wakeLock.request('screen').then(lock => {
                        wakeLock = lock;
                        logDebug('WakeLock acquired.');
                        document.addEventListener('visibilitychange', async () => {
                            if (wakeLock !== null && document.visibilityState === 'visible') {
                                wakeLock = await navigator.wakeLock.request('screen');
                            }
                        });
                    }).catch(err => logDebug('WakeLock error: ' + err.message));
                }
            } catch (e) {
                logDebug('WakeLock API error: ' + e.message);
            }
        });
    </script>
</body>
</html>
