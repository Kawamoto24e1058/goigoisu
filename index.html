<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ゴイゴイスー App Final V9</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #start-container {
            text-align: center;
            z-index: 10;
        }

        #start-button {
            padding: 25px 60px;
            font-size: 2rem;
            font-weight: 900;
            color: #ffffff;
            background: linear-gradient(135deg, #ff4d00, #ff0000);
            border: none;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            cursor: pointer;
            transition: transform 0.1s;
        }

        #start-button:active {
            transform: scale(0.95);
        }

        .guide-text {
            margin-top: 25px;
            font-size: 1.1rem;
            opacity: 0.8;
            font-weight: bold;
        }

        #result-display {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 100;
        }

        .goi-su-text {
            font-family: Impact, 'Arial Black', sans-serif;
            font-size: 30vw;
            font-weight: 900;
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 0.1em;
        }

        /* ---------------- V9 Goi Styles (Graceful FadeOut) ---------------- */
        .color-goi {
            color: #FFFF00;
            text-shadow: 0 5px 15px #000, 0 0 30px #ff4d00;
        }

        @keyframes fadeOutGoi {
            0% { opacity: 1; transform: scale(1.5) translateY(0); text-shadow: 0 0 50px #fff; }
            100% { opacity: 0; transform: scale(1.2) translateY(-10vh); text-shadow: 0 0 0 transparent; }
        }

        .animate-goi {
            animation: fadeOutGoi 1.2s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        }

        /* ---------------- V9 Su Styles (Massive Impact) ---------------- */
        .color-su {
            color: #FFFFFF;
            text-shadow: 0 10px 30px #000, 0 0 50px #00aaff, 0 0 100px #fff;
        }

        @keyframes impactSu {
            0% { opacity: 1; transform: scale(6); text-shadow: 0 0 150px #fff; }
            15% { opacity: 1; transform: scale(2.8); text-shadow: 0 0 60px #00aaff; }
            85% { opacity: 1; transform: scale(2.8); text-shadow: 0 0 60px #00aaff; }
            100% { opacity: 0; transform: scale(2.7); text-shadow: 0 0 0 transparent; }
        }

        .animate-su {
            animation: impactSu 2.0s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        }

        @keyframes whiteFlash {
            0% { background-color: #ffffff; }
            15% { background-color: rgba(255, 255, 255, 0.3); }
            100% { background-color: #000000; }
        }

        .flash-white {
            animation: whiteFlash 0.6s ease-out forwards;
        }

        #debug-log {
            position: fixed;
            bottom: 10px;
            left: 10px;
            right: 10px;
            color: #ffaa00;
            font-size: 10px;
            font-family: monospace;
            pointer-events: none;
            z-index: 1000;
            white-space: pre-wrap;
            display: none; /* Set to block for debugging */
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="start-container">
        <button id="start-button">開始（許可）</button>
        <p class="guide-text">スマホを前に突き出すと判定されます</p>
    </div>

    <div id="result-display">
        <div id="text-element" class="goi-su-text"></div>
    </div>

    <div id="debug-log"></div>

    <script>
        const startButton = document.getElementById('start-button');
        const startContainer = document.getElementById('start-container');
        const textElement = document.getElementById('text-element');

        let synth = null;
        let isThrusting = false;
        let thrustStartTime = 0;
        let hasTriggered = false;
        let wakeLock = null;

        function logDebug(msg) {
            const logEl = document.getElementById('debug-log');
            if (logEl) logEl.textContent += msg + '\n';
        }

        function speak(text, pitch, rate) {
            if (!synth) return;
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ja-JP';
            utter.pitch = pitch;
            utter.rate = rate;
            synth.speak(utter);
        }

        function showResult(type) {
            const isSu = type === 'su';
            textElement.textContent = isSu ? 'スー！' : 'ゴイ！';
            
            // Visual Reset
            textElement.classList.remove('animate-goi', 'animate-su', 'color-goi', 'color-su');
            document.body.classList.remove('flash-white');
            void textElement.offsetWidth; // Reflow
            
            if (isSu) {
                textElement.classList.add('animate-su', 'color-su');
                document.body.classList.add('flash-white');
                speak('スーーー！', 1.6, 0.8);
            } else {
                textElement.classList.add('animate-goi', 'color-goi');
                speak('ゴイ！', 0.9, 1.3);
            }
        }

        function handleMotion(event) {
            const acc = event.acceleration;
            const accG = event.accelerationIncludingGravity;
            if (!acc || !accG) return;
            
            const z = acc.z || 0;
            const gY = accG.y || 0;

            // Z-axis threshold <= -20 for firm movement
            if (z <= -20) {
                if (!isThrusting) {
                    isThrusting = true;
                    thrustStartTime = Date.now();
                    hasTriggered = false;
                } else if (!hasTriggered) {
                    const duration = Date.now() - thrustStartTime;
                    // Su Condition: Held for more than 0.25s AND vertical angle (Y >= 6.5)
                    if (duration >= 250 && gY >= 6.5) {
                        showResult('su');
                        hasTriggered = true;
                    }
                }
            } else {
                if (isThrusting) {
                    const duration = Date.now() - thrustStartTime;
                    if (!hasTriggered) {
                        // Goi Condition: Flick ended within 0.2s AND horizontal angle (Y < 6.5)
                        if (duration < 200 && gY < 6.5) {
                            showResult('goi');
                        }
                    }
                    
                    // Reset if acceleration subsides (Z > -5)
                    if (z > -5) {
                        isThrusting = false;
                        hasTriggered = false;
                    }
                }
            }
        }

        function startApp() {
            startContainer.classList.add('hidden');
            window.addEventListener('devicemotion', handleMotion);
        }

        startButton.addEventListener('click', () => {
            // Unlock Speech API
            synth = window.speechSynthesis;
            const unlockUtter = new SpeechSynthesisUtterance('');
            synth.speak(unlockUtter);

            // Unlock AudioContext
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                osc.connect(audioCtx.destination);
                osc.start(0);
                osc.stop(audioCtx.currentTime + 0.001);
            } catch (e) {}

            // Wake Lock
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').then(lock => {
                    wakeLock = lock;
                }).catch(() => {});
            }

            // Motion Permission
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') startApp();
                    })
                    .catch(console.error);
            } else {
                startApp();
            }
        });
    </script>
</body>
</html>
