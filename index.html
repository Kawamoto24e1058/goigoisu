<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ゴイゴイスー App V17 (Combo Edition)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Sunburst Background */
            background: repeating-conic-gradient(
                #d11a2a 0 15deg,
                #a10d1c 15deg 30deg
            );
            color: #ffffff;
            font-family: 'Dela Gothic One', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes screenShake {
            0% { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(-2vw, -2vh) rotate(-2deg); }
            30% { transform: translate(2vw, 2vh) rotate(2deg); }
            50% { transform: translate(-2vw, 2vh) rotate(-1deg); }
            70% { transform: translate(2vw, -2vh) rotate(1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .shake-body {
            animation: screenShake 0.3s ease-out;
        }

        #start-container {
            text-align: center;
            z-index: 10;
            background: rgba(0,0,0,0.7);
            padding: 40px;
            border-radius: 20px;
            border: 4px solid #fff;
        }

        #start-button {
            padding: 20px 50px;
            font-size: 2rem;
            font-family: 'Dela Gothic One', sans-serif;
            color: #fff;
            background: #e60000;
            border: 4px solid #fff;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        #start-button:active {
            transform: scale(0.95);
        }

        .guide-text {
            margin-top: 25px;
            font-size: 1.2rem;
            opacity: 0.9;
        }

        #result-display {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            pointer-events: none;
            z-index: 100;
        }

        .goi-su-text {
            font-size: min(20vw, 150px);
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: -0.1em;
            text-align: center;
        }

        /* Override for the long line "スーを差し上げます！" */
        .jackpot-text {
            font-size: min(12vw, 80px) !important;
            white-space: pre-wrap !important; /* Allow line breaks if needed */
            line-height: 1.2;
            padding: 0 5vw;
        }

        /* Double Stroke Mixin */
        .double-stroke {
            text-shadow: 
                -1vw -1vw 0 #000,  1vw -1vw 0 #000, -1vw  1vw 0 #000,  1vw  1vw 0 #000,
                 0   -1vw 0 #000,  0    1vw 0 #000, -1vw  0   0 #000,  1vw  0   0 #000,
                -2.5vw -2.5vw 0 #fff,  2.5vw -2.5vw 0 #fff, -2.5vw  2.5vw 0 #fff,  2.5vw  2.5vw 0 #fff,
                 0    -2.5vw 0 #fff,  0     2.5vw 0 #fff, -2.5vw  0   0 #fff,  2.5vw  0   0 #fff,
                 3vw 3vw 0px rgba(0,0,0,0.4);
        }

        /* Combo Text Shadow Override for Glowing Jackpot */
        .double-stroke-gold {
            text-shadow: 
                -1vw -1vw 0 #000,  1vw -1vw 0 #000, -1vw  1vw 0 #000,  1vw  1vw 0 #000,
                 0   -1vw 0 #000,  0    1vw 0 #000, -1vw  0   0 #000,  1vw  0   0 #000,
                -2.5vw -2.5vw 0 #FFD700,  2.5vw -2.5vw 0 #FFD700, -2.5vw  2.5vw 0 #FFD700,  2.5vw  2.5vw 0 #FFD700,
                 0    -2.5vw 0 #FFD700,  0     2.5vw 0 #FFD700, -2.5vw  0   0 #FFD700,  2.5vw  0   0 #FFD700,
                 0 0 100px #FFEA00, 0 0 200px #FFFFFF;
        }

        /* Colors */
        .color-goi { color: #FFEA00; }
        .color-gogoi { color: #FF5722; } /* Dark Orange for 5 Combo */
        .color-su { color: #00E5FF; font-style: italic; }
        .color-sue-jackpot { color: #FFFFFF; font-style: italic; } /* White text, Gold stroke */
        .color-weak-su { color: #888888; opacity: 0.7; } /* Translucent Grey */
        .color-ultimate { color: #FFD700; font-style: italic; }

        .ultimate-text {
            font-size: min(14vw, 90px) !important;
            white-space: nowrap !important;
        }

        /* Ultimate Finish Stroke: Thick Black inside, Massive Red outside */
        .double-stroke-red {
            text-shadow: 
                -1vw -1vw 0 #000,  1vw -1vw 0 #000, -1vw  1vw 0 #000,  1vw  1vw 0 #000,
                 0   -1vw 0 #000,  0    1vw 0 #000, -1vw  0   0 #000,  1vw  0   0 #000,
                -3vw -3vw 0 #e60000,  3vw -3vw 0 #e60000, -3vw  3vw 0 #e60000,  3vw  3vw 0 #e60000,
                 0    -3vw 0 #e60000,  0     3vw 0 #e60000, -3vw  0   0 #e60000,  3vw  0   0 #e60000,
                 4vw 4vw 0px rgba(0,0,0,0.5);
        }

        /* Animations */
        @keyframes popGoi {
            0% { transform: scale(0); opacity: 0; }
            20% { transform: scale(1.3); opacity: 1; }
            80% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        .animate-goi {
            animation: popGoi 1.0s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        }

        @keyframes zoomSu {
            0% { transform: scale(0.1); opacity: 0; }
            30% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1.0); opacity: 1; }
        }

        .animate-su {
            animation: zoomSu 2.0s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        }

        @keyframes fallDown {
            0% { transform: translateY(-5vh) rotate(-5deg); opacity: 0.7; }
            100% { transform: translateY(30vh) rotate(15deg); opacity: 0; }
        }

        .animate-weak-su {
            animation: fallDown 2.5s ease-in forwards;
        }

        @keyframes jackpotZoom {
            0% { transform: scale(0.1); opacity: 0; }
            40% { transform: scale(1.3) rotate(-5deg); opacity: 1; }
            60% { transform: scale(1.0) rotate(2deg); opacity: 1; }
            100% { transform: scale(1.1) rotate(0deg); opacity: 1; }
        }

        .animate-jackpot {
            animation: jackpotZoom 4.0s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        }

        /* Jackpot Screen Flash background */
        @keyframes goldFlash {
            0% { background-color: rgba(255, 255, 255, 1); }
            50% { background-color: rgba(255, 215, 0, 0.6); }
            100% { background-color: transparent; }
        }

        .flash-gold {
            /* We use a pseudo element for flashing so we don't break the sunburst */
            position: relative;
        }
        .flash-gold::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 50;
            animation: goldFlash 1.5s ease-out forwards;
        }

        /* Ultimate Rainbow Flash & Earthquake */
        @keyframes flashRainbow {
            0% { background-color: rgba(255, 0, 0, 0.7); }
            16% { background-color: rgba(255, 165, 0, 0.7); }
            33% { background-color: rgba(255, 255, 0, 0.7); }
            50% { background-color: rgba(0, 255, 0, 0.7); }
            66% { background-color: rgba(0, 255, 255, 0.7); }
            83% { background-color: rgba(0, 0, 255, 0.7); }
            100% { background-color: rgba(255, 0, 255, 0.7); }
        }

        .flash-rainbow::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 50;
            mix-blend-mode: color-dodge;
            animation: flashRainbow 0.15s linear infinite alternate;
        }

        @keyframes earthquake {
            0% { transform: translate(-3vw, -3vh) rotate(-3deg); }
            100% { transform: translate(3vw, 3vh) rotate(3deg); }
        }

        .earthquake-body {
            animation: earthquake 0.1s linear 15 alternate;
        }

        /* Particles */
        .star-particle {
            position: absolute;
            top: 50%; left: 50%;
            width: min(8vw, 60px); height: min(8vw, 60px);
            background: #FFEA00;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: blast 0.6s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
            z-index: 50;
            pointer-events: none;
        }

        /* Jackpot Stars */
        .star-particle-gold {
            background: #FFFFFF;
            width: min(12vw, 90px); height: min(12vw, 90px);
            animation: blastJackpot 1.5s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        }

        @keyframes blast {
            0% { transform: translate(-50%, -50%) scale(0.5) rotate(0deg); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.5) rotate(360deg); opacity: 0; }
        }
        @keyframes blastJackpot {
            0% { transform: translate(-50%, -50%) scale(1.0) rotate(0deg); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tx) * 2), calc(-50% + var(--ty) * 2)) scale(2.0) rotate(720deg); opacity: 0; }
        }

        .hidden { display: none !important; }


    </style>
</head>
<body>
    <div id="start-container">
        <button id="start-button">開始（許可）</button>
        <p class="guide-text">↑ 縦振り：ゴイ！<br>→ 横振り：スー！</p>
    </div>

    <div id="result-display">
        <div id="text-element" class="goi-su-text double-stroke"></div>
    </div>



    <script>
        const startButton = document.getElementById('start-button');
        const startContainer = document.getElementById('start-container');
        const textElement = document.getElementById('text-element');

        let synth = null;
        let lastTriggerTime = 0;
        const COOLDOWN_MS = 200; // Professional Speed
        const THRESHOLD = 12;    // V21 Relaxed Threshold for less fatigue
        const RATIO = 3.5;       // V21 Ultra-Strict Ratio to prevent diagonals
        let wakeLock = null;

        // Combo Counters
        let goiCount = 0;
        let sueCount = 0;
        

        
        // Ultimate Finish Flag
        let isGogoiActive = false;
        let gogoiTimeoutId = null;

        function speak(text, pitch, rate, volume = 1.0) {
            if (!synth) return;
            
            // Speech API Freeze Mitigation (iOS specific bug fix)
            try {
                synth.cancel(); 
            } catch(e) {
                console.warn('Speech cancel error:', e);
            }
            
            // Delay before speaking to avoid cancel() lock
            setTimeout(() => {
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'ja-JP';
                utter.pitch = pitch;
                utter.rate = rate;
                utter.volume = volume;
                synth.speak(utter);
            }, 50);
        }

        function createParticles(type = 'normal') {
            document.querySelectorAll('.star-particle, .star-particle-gold').forEach(el => el.remove());
            
            let particleCount = 8;
            let className = 'star-particle';
            let colors = ['#FFEA00'];
            
            if (type === 'jackpot') {
                particleCount = 15;
                className = 'star-particle-gold';
            } else if (type === 'ultimate') {
                particleCount = 30;
                className = 'star-particle-gold';
                colors = ['#FFD700', '#FFEA00', '#FF0000', '#00E5FF', '#FF00FF'];
            }
            
            for(let i = 0; i < particleCount; i++) {
                const p = document.createElement('div');
                p.className = className;
                
                if (type === 'ultimate') {
                    p.style.background = colors[Math.floor(Math.random() * colors.length)];
                }
                
                document.body.appendChild(p);
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = type === 'ultimate' ? (50 + Math.random() * 80) : (30 + Math.random() * 50);
                p.style.setProperty('--tx', Math.cos(angle) * velocity + 'vw');
                p.style.setProperty('--ty', Math.sin(angle) * velocity + 'vw');
                
                setTimeout(() => p.remove(), type === 'normal' ? 600 : 1500);
            }
        }

        function showResult(type) {
            // Visual Reset
            textElement.classList.remove('animate-goi', 'animate-su', 'animate-jackpot', 'animate-weak-su', 'color-goi', 'color-su', 'color-gogoi', 'color-sue-jackpot', 'color-weak-su', 'jackpot-text', 'double-stroke-gold', 'double-stroke');
            document.body.classList.remove('shake-body', 'flash-gold');
            void textElement.offsetWidth; // Force Reflow
            
            // Re-apply base stroke unless overridden
            textElement.classList.add('double-stroke');

            if (type === 'su') {
                // 10% Rare "Weak Su" Failure
                if (Math.random() < 0.1) {
                    sueCount = 0;
                    textElement.innerHTML = 'ｽｰ...';
                    textElement.classList.remove('double-stroke');
                    textElement.classList.add('animate-weak-su', 'color-weak-su');
                    textElement.style.fontSize = '8vw';
                    
                    speak('ｽｰ', 0.3, 0.3, 0.5);
                    return;
                }
                
                // Reset font size if coming from Weak Su
                textElement.style.fontSize = '';
                
                goiCount = 0;
                sueCount++;

                if (sueCount === 3) {
                    // Jackpot Su
                    sueCount = 0;
                    createParticles('jackpot');
                    
                    // Force a break in the text if it's too long
                    textElement.innerHTML = 'スーを<br>差し上げます！';
                    
                    textElement.classList.remove('double-stroke');
                    textElement.classList.add('animate-jackpot', 'color-sue-jackpot', 'jackpot-text', 'double-stroke-gold');
                    document.body.classList.add('flash-gold');
                    
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 500]);
                    speak('スーをさしあげます！', 1.8, 0.9);
                } else {
                    // Normal Su
                    createParticles('normal');
                    textElement.innerHTML = 'スー！';
                    textElement.classList.add('animate-su', 'color-su');
                    speak('スーーー！', 1.6, 0.8);
                }

            } else if (type === 'goi') {
                // Noise Immunity for Ultimate Finisher!
                // If we are waiting for the Final 'Su', perfectly ignore ALL vertical shakings.
                if (isGogoiActive) return;
                
                // Reset font size
                textElement.style.fontSize = '';
                
                sueCount = 0;
                goiCount++;

                if (goiCount === 5) {
                    // Combo Goi
                    goiCount = 0;
                    
                    // Arm the ultimate finish flag
                    isGogoiActive = true;
                    if (gogoiTimeoutId) clearTimeout(gogoiTimeoutId);
                    gogoiTimeoutId = setTimeout(() => {
                        isGogoiActive = false;
                    }, 3000); // 3 seconds to execute the Su finish
                    
                    createParticles('normal');
                    textElement.innerHTML = 'ゴゴイ！';
                    textElement.classList.add('animate-goi', 'color-gogoi');
                    document.body.classList.add('shake-body');
                    
                    if (navigator.vibrate) navigator.vibrate(200);
                    speak('ゴゴイ！', 1.1, 1.4);
                } else {
                    // Normal Goi
                    createParticles('normal');
                    textElement.innerHTML = 'ゴイ！';
                    textElement.classList.add('animate-goi', 'color-goi');
                    document.body.classList.add('shake-body');
                    
                    if (navigator.vibrate) navigator.vibrate(100);
                    speak('ゴイ！', 0.9, 1.3);
                }
            }
        }

        function handleMotion(event) {
            const acc = event.acceleration;
            if (!acc) return;
            
            const x = acc.x || 0;
            const y = acc.y || 0;
            const absX = Math.abs(x);
            const absY = Math.abs(y);
            const now = Date.now();



            if (now - lastTriggerTime < COOLDOWN_MS) return;

            // Strict V21 Physics: 3.5x Dominance + Relaxed 12G Threshold
            // Added Z-Axis Filter to ignore 'punches' and complex noisy shakes
            const z = acc.z || 0;
            const absZ = Math.abs(z);
            
            // Y-Axis: Minimum 12G (Chop motion)
            // X-Axis: Minimum 12G (Swing motion)
            if (absY > THRESHOLD && absY > absX * RATIO && absY > absZ * 2.0) {
                showResult('goi');
                lastTriggerTime = now;
            } else if (absX > THRESHOLD && absX > absY * RATIO && absX > absZ * 2.0) {
                showResult('su');
                lastTriggerTime = now;
            }
        }

        function startApp() {
            startContainer.classList.add('hidden');
            window.addEventListener('devicemotion', handleMotion);
        }

        startButton.addEventListener('click', () => {
            synth = window.speechSynthesis;
            let u = new SpeechSynthesisUtterance('');
            synth.speak(u);

            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                osc.connect(audioCtx.destination);
                osc.start(0);
                osc.stop(audioCtx.currentTime + 0.001);
            } catch (e) {}

            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').then(lock => {
                    wakeLock = lock;
                }).catch(() => {});
            }

            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') startApp();
                    })
                    .catch(console.error);
            } else {
                startApp();
            }
        });
    </script>
</body>
</html>
